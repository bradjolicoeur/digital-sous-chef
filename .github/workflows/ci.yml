name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  # Always runs. Deploy is gated on this job succeeding.
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: souschef
          POSTGRES_PASSWORD: souschef
          POSTGRES_DB: souschef_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__marten: >-
        Host=localhost;Port=5432;Database=souschef_test;Username=souschef;Password=souschef

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore src/DigitalSousChef/DigitalSousChef.Tests/DigitalSousChef.Tests.csproj

      - name: Build
        run: dotnet build src/DigitalSousChef/DigitalSousChef.Tests/DigitalSousChef.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test src/DigitalSousChef/DigitalSousChef.Tests/DigitalSousChef.Tests.csproj --no-build -c Release --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

  # ── 2. Build & Push ─────────────────────────────────────────────────────────
  # Runs after tests pass. Builds and pushes the image on pushes to main;
  # builds only (no push) on pull requests.
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push'
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          # Push only on main — PRs validate the build without publishing
          push: ${{ github.event_name == 'push' }}
          tags: |
            us-east1-docker.pkg.dev/bradjolicoeur-web/digital-sous-chef/digital-sous-chef:${{ github.sha }}
            us-east1-docker.pkg.dev/bradjolicoeur-web/digital-sous-chef/digital-sous-chef:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy ────────────────────────────────────────────────────────────────
  # Runs only on push to main, after the image has been pushed successfully.
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: digital-sous-chef-server
          region: us-east1
          image: us-east1-docker.pkg.dev/bradjolicoeur-web/digital-sous-chef/digital-sous-chef:${{ github.sha }}
          env_vars: |
            ConnectionStrings__marten=${{ secrets.DATABASE_CONNECTION }}
            FusionAuth__Issuer=${{ secrets.OIDCAUTHORITY }}
            ASPNETCORE_ENVIRONMENT=Production
          flags: --port=8080 --allow-unauthenticated
