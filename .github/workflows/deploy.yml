name: Deploy

# Runs on every push to main — builds the single Docker image (server + embedded
# React frontend) and deploys it to GCP Cloud Run.
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. GCP auth ──────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Docker → Artifact Registry ────────────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      # ── 4. Buildx ────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build & push ───────────────────────────────────────────────────────
      # Builds Dockerfile.server (three-stage: node-build → dotnet build → final).
      # Tags both :sha (immutable, for the deploy step) and :latest (convenience).
      # GHA layer cache keeps npm install and dotnet restore fast on subsequent runs.
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            us-east1-docker.pkg.dev/bradjolicoeur-web/digital-sous-chef/digital-sous-chef:${{ github.sha }}
            us-east1-docker.pkg.dev/bradjolicoeur-web/digital-sous-chef/digital-sous-chef:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Deploy to Cloud Run ────────────────────────────────────────────────
      # Uses the immutable :sha tag so the exact image built in step 5 is deployed.
      # Secrets are injected as env vars at deploy time — never baked into the image.
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: digital-sous-chef-server
          region: us-east1
          image: us-east1-docker.pkg.dev/bradjolicoeur-web/digital-sous-chef/digital-sous-chef:${{ github.sha }}
          env_vars: |
            ConnectionStrings__marten=${{ secrets.DATABASE_CONNECTION }}
            FusionAuth__Issuer=${{ secrets.OIDCAUTHORITY }}
            ASPNETCORE_ENVIRONMENT=Production
          flags: --port=8080 --allow-unauthenticated
