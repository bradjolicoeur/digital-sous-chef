<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Chef's toque - Digital Sous Chef favicon -->
  <!-- Hat band / brim -->
  <rect x="6" y="22" width="20" height="6" rx="2" fill="#863bff"/>
  <!-- Hat body: three overlapping circles for the classic puffed toque -->
  <circle cx="16" cy="15" r="8" fill="#863bff"/>
  <circle cx="9.5" cy="18" r="5.5" fill="#863bff"/>
  <circle cx="22.5" cy="18" r="5.5" fill="#863bff"/>
  <!-- Bridge fill between puffs and band -->
  <rect x="6" y="17" width="20" height="6" fill="#863bff"/>
  <!-- Subtle highlight on main puff for depth -->
  <circle cx="13.5" cy="12.5" r="2.5" fill="white" opacity="0.18"/>
</svg>
